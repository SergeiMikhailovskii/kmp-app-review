name: Validate PR
on:
  pull_request:
    branches:
      - 'master'
jobs:
  build_project:
    runs-on: macos-latest
    env:
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{secrets.SIGNING_SECRET_KEY_RING}}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{secrets.SIGNING_KEY_ID}}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{secrets.SIGNING_PASSWORD}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      # Do not set LIBRARY_VERSION to *-SNAPSHOT* here: Maven Central rejects SNAPSHOT
      # uploads. PR validation uses the version catalog default and publishes locally only.

      - name: Build and verify publication (local only)
        run: |
          ./gradlew build publishToMavenLocal --no-daemon
